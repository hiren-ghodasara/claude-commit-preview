<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" width="580" height="360">
<defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; }
    .mono { font-family: Cascadia Code, Fira Code, Consolas, monospace; }

    #s1 { animation: s1 16s ease-in-out infinite; }
    #s2 { animation: s2 16s ease-in-out infinite; }
    #s3 { animation: s3 16s ease-in-out infinite; }
    #s4 { animation: s4 16s ease-in-out infinite; }

    @keyframes s1 {
      0%   { opacity: 0; }
      5%   { opacity: 1; }
      22%  { opacity: 1; }
      27%  { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes s2 {
      0%,25%  { opacity: 0; }
      30%     { opacity: 1; }
      47%     { opacity: 1; }
      52%     { opacity: 0; }
      100%    { opacity: 0; }
    }
    @keyframes s3 {
      0%,50%  { opacity: 0; }
      55%     { opacity: 1; }
      72%     { opacity: 1; }
      77%     { opacity: 0; }
      100%    { opacity: 0; }
    }
    @keyframes s4 {
      0%,75%  { opacity: 0; }
      80%     { opacity: 1; }
      95%     { opacity: 1; }
      100%    { opacity: 0; }
    }

    #spinner {
      transform-box: fill-box;
      transform-origin: center;
      animation: spin 1s linear infinite, spinshow 16s step-end infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes spinshow {
      0%,25%  { opacity: 0; }
      30%     { opacity: 1; }
      52%     { opacity: 0; }
      100%    { opacity: 0; }
    }

    #cursor { animation: blink 0.9s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    #btn-ring { animation: btnring 16s ease-out infinite; }
    @keyframes btnring {
      0%,23% { opacity: 0; }
      25%    { opacity: 0.7; }
      29%    { opacity: 0; }
      100%   { opacity: 0; }
    }
  </style>
</defs>

<!-- Window background -->
<rect width="580" height="360" rx="10" fill="#1e1e1e"/>

<!-- Title bar -->
<rect width="580" height="28" rx="10" fill="#323232"/>
<rect y="18" width="580" height="10" fill="#323232"/>
<circle cx="18" cy="14" r="5" fill="#ff5f57"/>
<circle cx="34" cy="14" r="5" fill="#ffbd2e"/>
<circle cx="50" cy="14" r="5" fill="#28c841"/>
<text x="290" y="18" text-anchor="middle" fill="#9d9d9d" font-size="11">mongodb-export-import - Source Control</text>

<!-- Activity bar -->
<rect x="0" y="28" width="48" height="332" fill="#333333"/>
<rect x="10" y="50" width="28" height="26" rx="3" fill="#a855f7" opacity="0.12"/>
<text x="24" y="68" text-anchor="middle" fill="#cccccc" font-size="17">G</text>
<circle cx="37" cy="54" r="7" fill="#a855f7"/>
<text x="37" y="58" text-anchor="middle" fill="white" font-size="8" font-weight="bold">3</text>

<!-- Editor area -->
<rect x="280" y="28" width="300" height="332" fill="#1e1e1e"/>
<text x="296" y="55"  class="mono" fill="#1e3a1e" font-size="10">#!/bin/bash</text>
<text x="296" y="69"  class="mono" fill="#1e3a2a" font-size="10"># MongoDB Export Script</text>
<text x="296" y="97"  class="mono" fill="#1a2a3a" font-size="10">HOST="${1:-localhost}"</text>
<text x="296" y="111" class="mono" fill="#1a2a3a" font-size="10">PORT="${2:-27017}"</text>
<text x="296" y="125" class="mono" fill="#1a2a3a" font-size="10">DB="${3:-mydb}"</text>
<text x="296" y="153" class="mono" fill="#1a2a3a" font-size="10">mongodump \</text>
<text x="296" y="167" class="mono" fill="#1a2a3a" font-size="10">  --host "$HOST:$PORT" \</text>
<text x="296" y="181" class="mono" fill="#1a2a3a" font-size="10">  --db "$DB" \</text>
<text x="296" y="195" class="mono" fill="#1a2a3a" font-size="10">  --out "./backup"</text>

<!-- SCM panel background -->
<rect x="48" y="28" width="232" height="332" fill="#252526"/>

<!-- SCM panel header -->
<rect x="48" y="28" width="232" height="30" fill="#2d2d2d"/>
<text x="60" y="47" fill="#bbbbbb" font-size="10" font-weight="bold" letter-spacing="1.5">SOURCE CONTROL</text>

<!-- Sparkle button -->
<rect x="244" y="33" width="22" height="18" rx="3" fill="#3a3a3a"/>
<text x="255" y="46" text-anchor="middle" fill="#f59e0b" font-size="13">*</text>
<circle id="btn-ring" cx="255" cy="42" r="12" fill="none" stroke="#a855f7" stroke-width="2"/>

<!-- Commit button -->
<rect x="56" y="120" width="216" height="26" rx="4" fill="#0e639c"/>
<text x="164" y="137" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Commit</text>

<!-- Staged changes -->
<text x="62" y="163" fill="#bbbbbb" font-size="11" font-weight="bold">Staged Changes</text>
<circle cx="251" cy="160" r="9" fill="#505050"/>
<text x="251" y="164" text-anchor="middle" fill="white" font-size="8" font-weight="bold">3</text>
<text x="70" y="181" fill="#4ec9b0" font-size="10">mongodb-export.sh</text>
<text x="257" y="181" text-anchor="end" fill="#73c991" font-size="10">A</text>
<text x="70" y="197" fill="#4ec9b0" font-size="10">mongodb-import.sh</text>
<text x="257" y="197" text-anchor="end" fill="#73c991" font-size="10">A</text>
<text x="70" y="213" fill="#569cd6" font-size="10">README.md</text>
<text x="257" y="213" text-anchor="end" fill="#e2c08d" font-size="10">M</text>

<!-- Input box background -->
<rect x="56" y="66" width="216" height="46" rx="4" fill="#3c3c3c"/>

<!-- STEP 1: Empty state -->
<g id="s1">
  <text x="65" y="84" fill="#555555" font-size="10">Message (Ctrl+Enter to commit</text>
  <text x="65" y="98" fill="#555555" font-size="10">on "master")</text>
  <rect x="56" y="334" width="216" height="18" rx="9" fill="#1e1e1e" stroke="#404040" stroke-width="1"/>
  <text x="164" y="347" text-anchor="middle" fill="#888888" font-size="9">Step 1 - Stage your changes, click the button</text>
</g>

<!-- STEP 2: Generating -->
<g id="s2">
  <text x="65" y="84" fill="#555555" font-size="10">Message (Ctrl+Enter to commit</text>
  <text x="65" y="98" fill="#555555" font-size="10">on "master")</text>
  <rect x="244" y="33" width="22" height="18" rx="3" fill="#a855f7" opacity="0.35"/>
  <rect x="285" y="318" width="278" height="36" rx="6" fill="#252526" stroke="#454545" stroke-width="1"/>
  <path id="spinner" d="M 304 336 m 0 -9 a 9 9 0 1 1 -6.36 2.64" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round"/>
  <text x="320" y="333" fill="#cccccc" font-size="10" font-weight="bold">Claude Commit Preview</text>
  <text x="320" y="347" fill="#888" font-size="9">Generating commit message via Claude CLI...</text>
  <rect x="56" y="334" width="216" height="18" rx="9" fill="#1c0f2e" stroke="#a855f7" stroke-width="1"/>
  <text x="164" y="347" text-anchor="middle" fill="#c084fc" font-size="9">Step 2 - Claude CLI is analyzing your diff...</text>
</g>

<!-- STEP 3: Message filled -->
<g id="s3">
  <rect x="56" y="66" width="216" height="46" rx="4" fill="#3c3c3c" stroke="#a855f7" stroke-width="1.5"/>
  <text x="65" y="84"  fill="#d4d4d4" font-size="10">feat(scripts): add mongodb export and</text>
  <text x="65" y="98"  fill="#d4d4d4" font-size="10">import bash scripts [SP-123]</text>
  <rect id="cursor" x="213" y="89" width="1.5" height="10" fill="#a855f7"/>
  <rect x="56" y="334" width="216" height="18" rx="9" fill="#0f1f0f" stroke="#4ec9b0" stroke-width="1"/>
  <text x="164" y="347" text-anchor="middle" fill="#4ec9b0" font-size="9">Step 3 - Message filled, review and edit it</text>
</g>

<!-- STEP 4: Dialog -->
<g id="s4">
  <rect x="56" y="66" width="216" height="46" rx="4" fill="#3c3c3c" stroke="#a855f7" stroke-width="1.5"/>
  <text x="65" y="84"  fill="#d4d4d4" font-size="10">feat(scripts): add mongodb export and</text>
  <text x="65" y="98"  fill="#d4d4d4" font-size="10">import bash scripts [SP-123]</text>
  <rect x="285" y="302" width="278" height="52" rx="6" fill="#252526" stroke="#454545" stroke-width="1"/>
  <text x="300" y="320" fill="#cccccc" font-size="11" font-weight="bold">Commit message filled!</text>
  <text x="300" y="335" fill="#888888" font-size="9.5">Review it in the Source Control panel.</text>
  <text x="300" y="348" fill="#666666" font-size="9">Source: Claude Commit Preview</text>
  <rect x="370" y="336" width="84" height="16" rx="3" fill="#0e639c"/>
  <text x="412" y="347" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Commit Now</text>
  <rect x="460" y="336" width="68" height="16" rx="3" fill="#3d3d3d" stroke="#555555" stroke-width="0.5"/>
  <text x="494" y="347" text-anchor="middle" fill="#cccccc" font-size="9">Edit First</text>
  <rect x="56" y="334" width="216" height="18" rx="9" fill="#1f1500" stroke="#f59e0b" stroke-width="1"/>
  <text x="164" y="347" text-anchor="middle" fill="#f59e0b" font-size="9">Step 4 - Commit Now or Edit First</text>
</g>

</svg>
